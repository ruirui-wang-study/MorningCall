name: Daily Good Morning Email

on:
  schedule:
    # GitHub Actions cron 使用 UTC
    # 08:30（上海/新加坡 UTC+8）= 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build email content
        env:
          TIMEZONE: "Asia/Singapore"
          # News
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEWS_LANG: "en"
          NEWS_SOURCES_TECH: ${{ secrets.NEWS_SOURCES_TECH }}
          NEWS_SOURCES_FINANCE: ${{ secrets.NEWS_SOURCES_FINANCE }}
          # Gold
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          GOLD_SYMBOL: "XAU/USD"
          # 可选：缺 key 隐藏模块（你 app.py 里有这个开关）
          HIDE_MODULE_ON_MISSING_KEY: "1"
        run: |
          python app.py
          echo "=== subject ==="
          cat email_subject.txt
          echo "=== body ==="
          cat email_body.txt

      - name: Send mail via QQ SMTP
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}   # 例如：962302845@qq.com
          password: ${{ secrets.MAIL_PASSWORD }}   # QQ邮箱SMTP授权码（不是登录密码）
          from: ${{ secrets.MAIL_USERNAME }}
          to: 962302845@qq.com
          subject: "早安播报"
          # 关键：直接从文件读正文，避免多行 env 传输问题
          body: file://email_body.txt
          # 如果你未来想发 HTML，可用：
          # html_body: file://email_body.html